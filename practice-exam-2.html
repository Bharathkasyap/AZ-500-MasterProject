      color: #fff;

      background: #21262d;

      color: #c9d1d9;

      display: none;
      position: fixed;
      inset: 0;
      background: #00000099;
      z-index: 200;
      align-items: center;
      justify-content: center;

      padding: 2rem;

      margin-bottom: .75rem;
    }
    .modal .verdict.pass { color: #3fb950; }

    .modal .detail { font-size: .9rem; color: #8b949e; margin-bottom: 1.5rem; line-height: 1.6; }
    .modal .close-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: .6rem 2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
    }

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  answered: new Array(QUESTIONS.length).fill(false),
  correct:  new Array(QUESTIONS.length).fill(false)
};

// ── Build quiz ─────────────────────────────────────────────────────────────
function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  QUESTIONS.forEach((q, qi) => {
    const letters = ['A', 'B', 'C', 'D'];

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${qi}`;

    const optionsHTML = q.options.map((opt, oi) => `
      <button class="option-btn" id="opt-${qi}-${oi}" onclick="handleAnswer(${qi}, ${oi})" data-qi="${qi}" data-oi="${oi}">
        <span class="option-letter">${letters[oi]}</span>
        <span>${escapeHtml(opt)}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-number">Q${qi + 1}</span>
        <span class="domain-badge">${escapeHtml(q.domain)}</span>
      </div>
      <p class="q-text">${escapeHtml(q.q)}</p>
      <div class="options" id="opts-${qi}">
        ${optionsHTML}
      </div>
      <div class="explanation" id="exp-${qi}">
        <strong>Explanation:</strong> ${escapeHtml(q.explanation)}
      </div>
    `;

    container.appendChild(card);
  });

  updateScoreBar();
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Answer handler ─────────────────────────────────────────────────────────
function handleAnswer(qi, oi) {
  if (state.answered[qi]) return;
  state.answered[qi] = true;

  const isCorrect = oi === QUESTIONS[qi].correct;
  state.correct[qi] = isCorrect;

  const allBtns = document.querySelectorAll(`[id^="opt-${qi}-"]`);
  allBtns.forEach(btn => {
    btn.disabled = true;
    const btnOi = parseInt(btn.dataset.oi);
    if (btnOi === QUESTIONS[qi].correct) {
      btn.classList.add(oi === btnOi ? 'correct' : 'reveal-correct');
    }
    if (btnOi === oi && !isCorrect) {
      btn.classList.add('wrong');
    }
  });

  // If the chosen option was wrong, also clearly highlight the correct one
  if (!isCorrect) {
    document.getElementById(`opt-${qi}-${QUESTIONS[qi].correct}`).classList.remove('reveal-correct');
    document.getElementById(`opt-${qi}-${QUESTIONS[qi].correct}`).classList.add('correct');
  }

  document.getElementById(`exp-${qi}`).classList.add('show');
  document.getElementById(`card-${qi}`).classList.add('answered');

  updateScoreBar();
}

// ── Score bar ──────────────────────────────────────────────────────────────
function updateScoreBar() {
  const answeredCount = state.answered.filter(Boolean).length;
  const correctCount  = state.correct.filter(Boolean).length;
  const pct = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : null;

  document.getElementById('score-fraction').textContent  = `${correctCount} / ${answeredCount}`;
  document.getElementById('answered-count').textContent  = `${answeredCount} / ${QUESTIONS.length}`;
  document.getElementById('accuracy-pct').textContent    = pct !== null ? `${pct}%` : '—';
}

// ── Submit ─────────────────────────────────────────────────────────────────
function submitExam() {
  const answeredCount = state.answered.filter(Boolean).length;
  const correctCount  = state.correct.filter(Boolean).length;
  const pct = Math.round((correctCount / QUESTIONS.length) * 100);
  const pass = pct >= 70;

  const pctEl    = document.getElementById('modal-pct');
  const verdictEl = document.getElementById('modal-verdict');
  const detailEl = document.getElementById('modal-detail');

  pctEl.textContent = `${pct}%`;
  pctEl.className = `score-big ${pass ? 'pass' : 'fail'}`;

  verdictEl.textContent = pass ? '✅ PASS' : '❌ FAIL';
  verdictEl.className = `verdict ${pass ? 'pass' : 'fail'}`;

  detailEl.innerHTML = `
    You answered <strong>${answeredCount}</strong> of <strong>${QUESTIONS.length}</strong> questions.<br>
    Correct answers: <strong>${correctCount}</strong> &nbsp;|&nbsp; Incorrect: <strong>${answeredCount - correctCount}</strong><br>
    Unanswered: <strong>${QUESTIONS.length - answeredCount}</strong><br><br>
    Passing score is <strong>70%</strong>${pass ? ' — well done!' : ' — keep studying and try again!'}
  `;

  document.getElementById('result-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('result-modal').classList.remove('open');
}

// ── Reset ──────────────────────────────────────────────────────────────────
function resetExam() {
  state.answered.fill(false);
  state.correct.fill(false);
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ───────────────────────────────────────────────────────────────────
buildQuiz();
