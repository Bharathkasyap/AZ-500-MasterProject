const TOTAL = questions.length;
let answeredCount = 0;
const answeredFlags = new Array(TOTAL).fill(false);

function updateProgress() {
  const pct = (answeredCount / TOTAL) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = answeredCount + ' of ' + TOTAL + ' answered';
}

function showAnswer(qIndex) {
  const q = questions[qIndex];
  const card = document.getElementById('card-' + qIndex);
  const labels = card.querySelectorAll('.options label');
  labels.forEach((lbl, i) => {
    if (i === q.correct) {
      lbl.classList.add('option-correct');
    } else {
      lbl.classList.add('option-incorrect');
    }
    const radio = lbl.previousElementSibling;
    if (radio) radio.disabled = true;
  });
  const btn = document.getElementById('showbtn-' + qIndex);
  btn.disabled = true;
  btn.textContent = 'Answer Shown \u2713';
  document.getElementById('exp-' + qIndex).classList.add('visible');
  if (!answeredFlags[qIndex]) {
    answeredFlags[qIndex] = true;
    answeredCount++;
    updateProgress();
  }
}

function toggleReview(qIndex) {
  const card = document.getElementById('card-' + qIndex);
  const cb = document.getElementById('review-' + qIndex);
  if (cb.checked) {
    card.classList.add('reviewed');
  } else {
    card.classList.remove('reviewed');
  }
}

function submitExam() {
  let correct = 0;
  questions.forEach((q, i) => {
    const selected = document.querySelector('input[name="q' + i + '"]:checked');
    if (selected && parseInt(selected.value) === q.correct) {
      correct++;
    }
  });
  const pct = Math.round((correct / TOTAL) * 100);
  const scaled = pct * 10;
  const pass = scaled >= 700;
  document.getElementById('modalScore').textContent = correct + ' / ' + TOTAL;
  document.getElementById('modalPct').textContent = pct + '% correct';
  document.getElementById('modalScaled').textContent = 'Scaled Score: ' + scaled + ' / 1000';
  const badge = document.getElementById('modalBadge');
  badge.textContent = pass ? '\u2714 PASS' : '\u2718 FAIL';
  badge.className = 'result-badge ' + (pass ? 'pass' : 'fail');
  document.getElementById('scoreModal').classList.add('active');
}

// Render questions
(function renderQuestions() {
  const main = document.getElementById('examMain');
  const letters = ['A', 'B', 'C', 'D'];
  questions.forEach((q, i) => {
    const qNum = 151 + i;
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const qHeader = document.createElement('div');
    qHeader.className = 'q-header';

    const qNumSpan = document.createElement('span');
    qNumSpan.className = 'q-num';
    qNumSpan.textContent = 'Q' + qNum;

    const qText = document.createElement('div');
    qText.className = 'q-text';
    qText.textContent = q.q;

    qHeader.appendChild(qNumSpan);
    qHeader.appendChild(qText);
    card.appendChild(qHeader);

    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'options';
    q.options.forEach((opt, j) => {
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = 'q' + i;
      radio.id = 'q' + i + 'o' + j;
      radio.value = j;

      const label = document.createElement('label');
      label.htmlFor = 'q' + i + 'o' + j;
      label.textContent = letters[j] + '. ' + opt;

      optionsDiv.appendChild(radio);
      optionsDiv.appendChild(label);
    });
    card.appendChild(optionsDiv);

    const reviewRow = document.createElement('label');
    reviewRow.className = 'review-row';
    const reviewCb = document.createElement('input');
    reviewCb.type = 'checkbox';
    reviewCb.id = 'review-' + i;
    reviewCb.onchange = function() { toggleReview(i); };
    reviewRow.appendChild(reviewCb);
    reviewRow.appendChild(document.createTextNode(' Mark for Review'));
    card.appendChild(reviewRow);

    const showBtn = document.createElement('button');
    showBtn.className = 'show-btn';
    showBtn.id = 'showbtn-' + i;
    showBtn.textContent = 'Show Answer';
    showBtn.onclick = function() { showAnswer(i); };
    card.appendChild(showBtn);

    const expDiv = document.createElement('div');
    expDiv.className = 'explanation';
    expDiv.id = 'exp-' + i;
    expDiv.innerHTML = '<strong>Explanation:</strong> ' + escapeHtml(q.explanation);
    card.appendChild(expDiv);

    main.appendChild(card);
  });

  const submitWrap = document.createElement('div');
  submitWrap.className = 'submit-wrap';
  const submitBtn = document.createElement('button');
  submitBtn.className = 'submit-btn';
  submitBtn.textContent = 'Submit Exam';
  submitBtn.onclick = submitExam;
  submitWrap.appendChild(submitBtn);
  main.appendChild(submitWrap);
})();

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
