<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-500 Practice Exam 1 — 50 Questions</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azure: #0078d4;
    --azure-dark: #005a9e;
    --azure-light: #c7e0f4;
    --azure-bg: #f0f6fd;
    --correct: #107c10;
    --correct-bg: #dff6dd;
    --incorrect: #d13438;
    --incorrect-bg: #fde7e9;
    --neutral: #605e5c;
    --border: #d2d0ce;
    --white: #ffffff;
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --radius: 8px;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--azure-bg);
    color: #201f1e;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--azure-dark) 0%, var(--azure) 100%);
    color: var(--white);
    padding: 20px 24px 16px;
    box-shadow: var(--shadow);
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .3px; }
  header p  { font-size: .85rem; opacity: .88; margin-top: 3px; }

  /* ── Progress bar ── */
  #progress-section {
    background: var(--white);
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #progress-label { font-size: .82rem; color: var(--neutral); white-space: nowrap; min-width: 110px; }
  #progress-bar-track {
    flex: 1;
    height: 8px;
    background: var(--azure-light);
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: var(--azure);
    border-radius: 99px;
    transition: width .35s ease;
    width: 0%;
  }
  #score-badge {
    font-size: .82rem;
    font-weight: 600;
    color: var(--azure-dark);
    white-space: nowrap;
  }

  /* ── Main layout ── */
  main { max-width: 860px; margin: 32px auto; padding: 0 16px 60px; }

  /* ── Question card ── */
  #quiz-container { display: block; }
  .q-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 32px 24px;
    margin-bottom: 0;
  }
  .q-domain-badge {
    display: inline-block;
    font-size: .72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 14px;
  }
  .badge-d1 { background: #e8f4ff; color: #004e8c; }
  .badge-d2 { background: #f3f0ff; color: #4b0082; }
  .badge-d3 { background: #f0fff4; color: #0a5c00; }
  .badge-d4 { background: #fff4e0; color: #7a4100; }

  .q-number { font-size: .8rem; color: var(--neutral); margin-bottom: 6px; }
  .q-text   { font-size: 1.02rem; line-height: 1.6; font-weight: 500; margin-bottom: 22px; }

  /* ── Answer choices ── */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    font-size: .95rem;
    line-height: 1.5;
    transition: border-color .15s, background .15s;
    width: 100%;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--azure);
    background: var(--azure-bg);
  }
  .choice-btn.selected {
    border-color: var(--azure);
    background: #e5f1fb;
  }
  .choice-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .choice-btn.incorrect {
    border-color: var(--incorrect);
    background: var(--incorrect-bg);
  }
  .choice-letter {
    font-weight: 700;
    font-size: .88rem;
    min-width: 22px;
    padding-top: 1px;
    color: var(--azure-dark);
  }
  .choice-btn.correct  .choice-letter { color: var(--correct); }
  .choice-btn.incorrect .choice-letter { color: var(--incorrect); }

  /* ── Feedback / explanation ── */
  #feedback-box {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: .9rem;
    line-height: 1.55;
    display: none;
  }
  #feedback-box.show { display: block; }
  #feedback-box.fb-correct   { background: var(--correct-bg);   border-left: 4px solid var(--correct);   color: #0a3d0a; }
  #feedback-box.fb-incorrect { background: var(--incorrect-bg); border-left: 4px solid var(--incorrect); color: #5a0a0d; }
  #feedback-box strong { display: block; margin-bottom: 4px; font-size: .95rem; }

  /* ── Action buttons ── */
  .btn-row { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
  .btn {
    padding: 10px 22px;
    border-radius: var(--radius);
    font-size: .92rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .45; cursor: default; }
  .btn-primary { background: var(--azure); color: var(--white); }
  .btn-primary:hover:not(:disabled) { background: var(--azure-dark); }
  .btn-secondary { background: var(--white); color: var(--azure); border: 1.5px solid var(--azure); }
  .btn-secondary:hover:not(:disabled) { background: var(--azure-bg); }
  .btn-success { background: var(--correct); color: var(--white); }

  /* ── Results screen ── */
  #results-container { display: none; }
  .results-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 32px;
    text-align: center;
    margin-bottom: 28px;
  }
  .score-circle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 7px solid var(--azure);
    margin: 0 auto 20px;
    flex-direction: column;
  }
  .score-pct  { font-size: 2.2rem; font-weight: 800; color: var(--azure-dark); line-height: 1; }
  .score-lbl  { font-size: .75rem; color: var(--neutral); margin-top: 2px; }
  .results-card h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .results-card p  { color: var(--neutral); font-size: .95rem; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 24px 0 0;
    flex-wrap: wrap;
  }
  .stat-box {
    text-align: center;
    padding: 14px 24px;
    border-radius: var(--radius);
    background: var(--azure-bg);
    min-width: 110px;
  }
  .stat-box .val { font-size: 1.7rem; font-weight: 800; color: var(--azure-dark); }
  .stat-box .lbl { font-size: .78rem; color: var(--neutral); margin-top: 2px; }
  .stat-box.green .val { color: var(--correct); }
  .stat-box.red   .val { color: var(--incorrect); }

  /* ── Review section ── */
  #review-section { margin-top: 12px; }
  #review-section h3 {
    font-size: 1.15rem;
    color: var(--azure-dark);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--azure-light);
  }
  .review-item {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    padding: 18px 20px;
    margin-bottom: 12px;
    border-left: 5px solid var(--border);
  }
  .review-item.ri-correct   { border-left-color: var(--correct);   }
  .review-item.ri-incorrect { border-left-color: var(--incorrect); }
  .review-q    { font-size: .95rem; font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
  .review-meta { font-size: .85rem; margin-bottom: 5px; }
  .review-meta span { font-weight: 600; }
  .ri-correct  .ans-correct   { color: var(--correct); }
  .ri-incorrect .ans-user      { color: var(--incorrect); }
  .ri-incorrect .ans-correct   { color: var(--correct); }
  .review-exp  { font-size: .83rem; color: #444; margin-top: 8px; line-height: 1.5;
                 background: #f8f8f8; padding: 8px 12px; border-radius: 5px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .q-card, .results-card { padding: 20px 16px; }
    main { padding: 0 10px 40px; }
    .result-stats { gap: 14px; }
  }
</style>
</head>
<body>

<header>
  <h1>AZ-500 Microsoft Azure Security Technologies — Practice Exam 1</h1>
  <p>50 Questions &nbsp;|&nbsp; All 4 Exam Domains &nbsp;|&nbsp; 2026 Edition</p>
</header>

<div id="progress-section">
  <div id="progress-label">Question 1 of 50</div>
  <div id="progress-bar-track"><div id="progress-bar-fill"></div></div>
  <div id="score-badge">Score: 0 / 0</div>
</div>

<main>
  <!-- Quiz -->
  <div id="quiz-container">
    <div class="q-card">
      <div id="q-domain-badge" class="q-domain-badge badge-d1"></div>
      <div id="q-number" class="q-number"></div>
      <div id="q-text" class="q-text"></div>
      <div id="choices" class="choices"></div>
      <div id="feedback-box"></div>
      <div class="btn-row">
        <button id="btn-submit" class="btn btn-primary" disabled onclick="submitAnswer()">Submit Answer</button>
        <button id="btn-next"   class="btn btn-secondary" style="display:none" onclick="nextQuestion()">Next Question →</button>
        <button id="btn-finish" class="btn btn-success"   style="display:none" onclick="showResults()">View Results</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="results-container">
    <div class="results-card">
      <div class="score-circle">
        <div class="score-pct" id="res-pct">0%</div>
        <div class="score-lbl">Score</div>
      </div>
      <h2 id="res-headline"></h2>
      <p id="res-subtext"></p>
      <div class="result-stats">
        <div class="stat-box green"><div class="val" id="res-correct">0</div><div class="lbl">Correct</div></div>
        <div class="stat-box red">  <div class="val" id="res-wrong">0</div><div class="lbl">Incorrect</div></div>
        <div class="stat-box">      <div class="val">50</div><div class="lbl">Total</div></div>
      </div>
      <div class="btn-row" style="justify-content:center;margin-top:28px;">
        <button class="btn btn-primary" onclick="restartQuiz()">Retake Exam</button>
        <button class="btn btn-secondary" onclick="document.getElementById('review-section').scrollIntoView({behavior:'smooth'})">Review Answers ↓</button>
      </div>
    </div>
    <div id="review-section">
      <h3>📋 Answer Review — All 50 Questions</h3>
      <div id="review-items"></div>
    </div>
  </div>
</main>

<script>
// ─────────────────────────────────────────────
//  QUESTION BANK  (50 unique AZ-500 questions)
// ─────────────────────────────────────────────
const questions = [

  // ═══════════════════════════════════════
  //  DOMAIN 1 — Manage Identity and Access
  //  Questions 1–13
  // ═══════════════════════════════════════

  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "Your organization requires that users can only sign in to Azure portal from corporate-managed devices located in the company's headquarters IP range. Which Microsoft Entra ID feature should you configure to enforce this requirement?",
    choices: [
      "A. Microsoft Entra ID Protection user risk policy",
      "B. Conditional Access policy with Named Locations and device compliance filter",
      "C. Azure AD B2C custom policy",
      "D. Privileged Identity Management (PIM) activation policy"
    ],
    correct: 1,
    explanation: "Conditional Access policies allow you to combine Named Locations (IP ranges) with a device compliance filter to restrict access to Azure portal only from compliant, corporate-managed devices at the specified headquarters IP range."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "A security engineer needs to ensure that a Global Administrator role assignment is time-bound, requires justification, and triggers an approval workflow before activation. Which Microsoft Entra ID feature fulfills all three requirements?",
    choices: [
      "A. Microsoft Entra ID Conditional Access",
      "B. Azure Role-Based Access Control (RBAC) with deny assignments",
      "C. Privileged Identity Management (PIM) eligible assignment with approval workflow",
      "D. Administrative Units with scoped administrator roles"
    ],
    correct: 2,
    explanation: "PIM eligible assignments allow roles to be time-bound, require justification on activation, and can be configured with a multi-stage approval workflow before the role becomes active."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "You are deploying an Azure Function App that needs to read secrets from Azure Key Vault without storing credentials in the application code or configuration. What is the recommended approach?",
    choices: [
      "A. Store the service principal client secret in an environment variable and reference it in the Key Vault access policy",
      "B. Assign a system-assigned managed identity to the Function App and grant it the Key Vault Secrets User role",
      "C. Use a shared access signature (SAS) token stored in the Function App settings",
      "D. Configure a user-assigned managed identity on the Key Vault and share it across all function apps"
    ],
    correct: 1,
    explanation: "A system-assigned managed identity tied to the Function App allows Azure to automatically manage credentials. Granting it the Key Vault Secrets User RBAC role (or an access policy Get permission) enables secretless access to Key Vault."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "A partner company needs read-only access to a specific Azure subscription resource group. The partner's users must authenticate with their own corporate identities. What is the correct approach?",
    choices: [
      "A. Create local Microsoft Entra ID accounts for each partner user and assign them the Reader role",
      "B. Use Microsoft Entra External ID (B2C) to federate the partner identity provider",
      "C. Invite the partner users via Microsoft Entra B2B collaboration and assign them the Reader role on the resource group",
      "D. Configure a site-to-site VPN and grant the partner network access to the subscription"
    ],
    correct: 2,
    explanation: "Microsoft Entra B2B collaboration allows external users to sign in with their own organizational identities. After invitation, you assign them an RBAC role (Reader) scoped to the specific resource group."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "Your organization's security policy requires that all users who have not registered for MFA within 14 days must be blocked from signing in. Which combination of features should you configure?",
    choices: [
      "A. Conditional Access sign-in risk policy set to High, combined with MFA enforcement",
      "B. Microsoft Entra Identity Protection user risk policy requiring MFA registration, and a Conditional Access policy blocking users with high user risk",
      "C. An Access Review that removes users who haven't registered for MFA",
      "D. PIM activation policy requiring MFA at activation time"
    ],
    correct: 1,
    explanation: "Identity Protection's MFA registration policy can require users to register within a grace period, and a Conditional Access policy targeting high user risk can block sign-in, enforcing the 14-day window requirement."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "A company has 500 guest users who were granted access to a Teams site 18 months ago. Security policy mandates that guest access is reviewed and recertified every 6 months. Which Microsoft Entra ID feature automates this requirement?",
    choices: [
      "A. Privileged Identity Management access reviews scoped to guest users",
      "B. Microsoft Entra Entitlement Management access packages",
      "C. Microsoft Entra Access Reviews configured for guest users with auto-remove on denial",
      "D. Conditional Access policy targeting guest user sign-in frequency"
    ],
    correct: 2,
    explanation: "Microsoft Entra Access Reviews allow you to schedule recurring reviews of guest user access. The auto-apply result feature can automatically remove guests who are denied or do not respond, meeting the 6-month recertification requirement."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "You need to restrict a helpdesk team so they can reset passwords and manage licenses only for users in a specific department, without granting tenant-wide administrative rights. What should you configure?",
    choices: [
      "A. Assign the Helpdesk Administrator role at the subscription scope using RBAC",
      "B. Create an Administrative Unit containing the department's users and assign the Password Administrator and License Administrator roles scoped to that Administrative Unit",
      "C. Use PIM to make the helpdesk team eligible for the Global Administrator role with a very short activation window",
      "D. Create a custom RBAC role with password reset permissions at the resource group scope"
    ],
    correct: 1,
    explanation: "Administrative Units in Microsoft Entra ID enable role assignments scoped to a subset of users or groups, allowing helpdesk staff to perform password resets and license management only for users within that Administrative Unit."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "During an incident, a Global Administrator account is compromised. Your organization needs to regain tenant access immediately without relying on any standard sign-in flow. What should have been configured in advance?",
    choices: [
      "A. A second Global Administrator account protected with conditional access",
      "B. Emergency access (break-glass) accounts excluded from all Conditional Access policies, secured with strong passwords, and stored in a physical safe",
      "C. A PIM eligible assignment for a backup administrator",
      "D. A service principal with Global Administrator rights for automation"
    ],
    correct: 1,
    explanation: "Break-glass emergency access accounts are cloud-only accounts excluded from Conditional Access policies. They should use very strong passwords, be stored securely offline, and are used only when normal administrative access paths are unavailable."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "A developer is building a multi-tenant SaaS application where customers can sign up using their personal email addresses (Gmail, Outlook.com). Which Azure identity service is most appropriate for handling customer authentication?",
    choices: [
      "A. Microsoft Entra ID (workforce tenant) with B2B guest invitations",
      "B. Azure AD B2C (Microsoft Entra External ID for customers) with social identity provider federation",
      "C. Microsoft Entra External Identities with cross-tenant sync",
      "D. Privileged Identity Management with just-in-time access"
    ],
    correct: 1,
    explanation: "Azure AD B2C (now Microsoft Entra External ID for customers) is designed for customer-facing (CIAM) scenarios, supporting federation with social identity providers like Google and Microsoft accounts, allowing end-users to self-register with personal email addresses."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "Your Conditional Access policy is configured to require MFA for all sign-ins from outside corporate IP ranges. A user reports they can sign in without MFA while traveling. Which configuration is most likely the cause?",
    choices: [
      "A. The user's account is in the Excluded users section of the Conditional Access policy",
      "B. The user's device is marked as compliant, bypassing the Named Location condition",
      "C. The sign-in risk level is set to Medium, which skips MFA enforcement",
      "D. The user has a PIM active assignment that overrides Conditional Access"
    ],
    correct: 0,
    explanation: "Conditional Access policies have an Exclusions section for users and groups. If a user's account (or a group they belong to) is excluded, the policy will not apply to them even if all conditions match."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "You want to allow users in your tenant to reset their own passwords without calling the helpdesk, while requiring them to verify identity through both a mobile app notification and an email code. Which feature and configuration achieves this?",
    choices: [
      "A. Azure AD MFA with verification methods set to Authenticator app and email",
      "B. Self-Service Password Reset (SSPR) with the number of authentication methods required set to 2, enabling Microsoft Authenticator and email as methods",
      "C. Conditional Access authentication strength policy requiring phishing-resistant MFA",
      "D. Identity Protection sign-in risk remediation requiring password change"
    ],
    correct: 1,
    explanation: "SSPR allows users to reset passwords without helpdesk involvement. Setting the required methods count to 2 and enabling Microsoft Authenticator (app notification) and email as methods enforces dual-verification before a password reset is allowed."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "A virtual machine in Azure needs to authenticate to Microsoft SQL Database without any stored credentials. The VM is in a different resource group from the SQL server. What is the best solution?",
    choices: [
      "A. Create a service principal, store its secret in Azure Key Vault, and reference it from the VM",
      "B. Enable a system-assigned managed identity on the VM and configure Microsoft Entra authentication on SQL, granting the managed identity access",
      "C. Use a user-assigned managed identity attached to the SQL server",
      "D. Configure a connection string with Windows Integrated Authentication"
    ],
    correct: 1,
    explanation: "A system-assigned managed identity on the VM provides an automatically managed Microsoft Entra identity. By enabling Microsoft Entra authentication on Azure SQL and granting the managed identity a database role, the VM can authenticate without any stored credentials."
  },
  {
    domain: "D1",
    domainLabel: "Domain 1: Identity & Access",
    text: "An organization uses Microsoft Entra Entitlement Management to control access to sensitive project resources. A new employee should receive access to three specific applications, two SharePoint sites, and one Azure resource group as a single unit, with automatic removal after 90 days. How should this be configured?",
    choices: [
      "A. Create a dynamic group with a membership rule targeting the employee's department",
      "B. Configure an Access Package in Entitlement Management containing all required resources with a 90-day expiration policy",
      "C. Use PIM to create an eligible assignment bundle for all resources",
      "D. Create a Conditional Access policy that grants access to the required resources based on user attributes"
    ],
    correct: 1,
    explanation: "Entitlement Management Access Packages bundle multiple resources (apps, groups, SharePoint, Azure roles) into a single requestable unit, with configurable expiration policies that automatically remove access after the defined period."
  },

  // ═══════════════════════════════════════
  //  DOMAIN 2 — Secure Networking
  //  Questions 14–25
  // ═══════════════════════════════════════

  {
    domain: "D2",
    domainLabel: "Domain 2: Secure Networking",
    text: "A web application VM in Azure is receiving a volumetric UDP flood DDoS attack that is saturating the network link. The VM is in a Virtual Network that has Azure DDoS Protection Basic enabled. What is the correct action and its limitation?",
    choices: [
      "A. DDoS Protection Basic provides automatic mitigation for volumetric attacks; no additional action is needed",
      "B. DDoS Protection Basic only protects Azure infrastructure; upgrade to DDoS Protection Standard for per-VNet, adaptive tuning and application-layer protection",
      "C. Configure an NSG deny rule to block UDP traffic on all ports",
      "D. Enable Azure Firewall Premium with IDPS to detect and drop the UDP flood"
    ],
    correct: 1,
    explanation: "DDoS Protection Basic (now called Infrastructure Protection) protects Azure's shared infrastructure. DDoS Protection Standard (Network Protection) provides per-VNet adaptive tuning, telemetry, and DDoS Rapid Response support needed to protect individual workloads against volumetric attacks."
  },
  {
    domain: "D2",
    domainLabel: "Domain 2: Secure Networking",
    text: "Administrators currently use RDP over the public internet to manage Windows VMs in Azure, exposing port 3389 to the world. You need to eliminate this exposure while still allowing RDP access from Azure portal without a public IP on the VM. What should you deploy?",
    choices: [
      "A. A VPN Gateway with point-to-site connectivity and certificate authentication",
      "B. Azure Bastion in the same VNet as the VMs",
      "C. Just-in-Time VM access to open port 3389 only when needed",
      "D. A Network Security Group rule allowing RDP only from the IT team's IP range"
    ],
    correct: 1,
    explanation: "Azure Bastion provides browser-based RDP/SSH access to VMs directly through Azure portal over TLS, eliminating the need for public IPs or exposed management ports on the VMs."
  },
  {
    domain: "D2",
    domainLabel: "Domain 2: Secure Networking",
    text: "You need Azure Firewall to decrypt HTTPS traffic, inspect it for threats using signature-based detection, and re-encrypt it before forwarding to backend servers. Which Azure Firewall tier and feature combination is required?",
    choices: [
      "A. Azure Firewall Standard with application rules and FQDN filtering",
      "B. Azure Firewall Premium with TLS inspection and IDPS enabled",
      "C. Azure Firewall Standard with threat intelligence-based filtering in Alert and Deny mode",
      "D. Azure Firewall Premium with DNAT rules and network rules"
    ],
    correct: 1,
    explanation: "Azure Firewall Premium includes TLS inspection (which decrypts, inspects, and re-encrypts HTTPS traffic) and IDPS (Intrusion Detection and Prevention System) with signature-based detection, both required for deep packet inspection of encrypted traffic."
  },
  {
    domain: "D2",

    explanation: "The Windows Security Events via AMA (Azure Monitor Agent) connector supports custom XPath queries to collect only specific Event IDs. Selecting only Events 4688 and 4624 (Common tier or custom) minimizes ingestion volume and cost compared to collecting all events."
  },
  {
    domain: "D4",
    domainLabel: "Domain 4: Security Operations",
    text: "A threat intelligence analyst has identified a list of known malicious IP addresses used in a recent campaign targeting financial organizations. They want Microsoft Sentinel to automatically generate an incident when any Azure resource communicates with these IPs. What is the most efficient way to enable this?",
    choices: [
      "A. Write a custom KQL analytics rule with all malicious IPs hard-coded as a where clause filter",
      "B. Upload the malicious IPs as Threat Intelligence Indicators (via STIX/TAXII or Sentinel TI data connector), then enable the built-in TI analytics rules that match indicators against network logs",
      "C. Create a Sentinel watchlist with the IPs and reference it in all network-related analytics rules",
      "D. Configure Microsoft Defender for Cloud threat intelligence feed to block the IPs at the network level"
    ],
    correct: 1,
    explanation: "Sentinel's Threat Intelligence platform accepts STIX/TAXII feeds and manual indicator imports. Built-in TI analytics rules automatically correlate ingested malicious IP indicators against network connection logs (CEF, Syslog, AzureNetworkAnalytics), generating incidents without custom KQL per indicator."
  }
];

// ─────────────────────────────────────────────
//  QUIZ STATE
// ─────────────────────────────────────────────
let current   = 0;
let selected  = null;
let submitted = false;
let score     = 0;
let answered  = 0;
const userAnswers = new Array(questions.length).fill(null);

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
  const q = questions[current];

  // Domain badge
  const badge = document.getElementById('q-domain-badge');
  badge.textContent = q.domainLabel;
  badge.className = 'q-domain-badge ' + {
    D1: 'badge-d1', D2: 'badge-d2', D3: 'badge-d3', D4: 'badge-d4'
  }[q.domain];

  document.getElementById('q-number').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('q-text').textContent   = q.text;

  // Choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${['A','B','C','D'][i]}.</span><span>${c.replace(/^[A-D]\.\s*/,'')}</span>`;
    btn.onclick = () => selectChoice(i);
    choicesEl.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.style.display = 'none';

  // Buttons
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('btn-next').style.display   = 'none';
  document.getElementById('btn-finish').style.display = 'none';

  // Restore state if already answered
  if (userAnswers[current] !== null) {
    restoreState();
  }

  selected  = userAnswers[current];
  submitted = userAnswers[current] !== null;

  updateProgress();
}

function selectChoice(idx) {
  if (submitted) return;
  selected = idx;
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  document.getElementById('btn-submit').disabled = false;
}

function submitAnswer() {
  if (selected === null || submitted) return;
  submitted = true;
  userAnswers[current] = selected;
  answered++;

  const q    = questions[current];
  const btns = document.querySelectorAll('.choice-btn');
  const isCorrect = selected === q.correct;

  if (isCorrect) score++;

  btns.forEach((b, i) => {
    b.disabled = true;
    b.classList.remove('selected');
    if (i === q.correct) b.classList.add('correct');
    if (i === selected && !isCorrect) b.classList.add('incorrect');
  });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box show ' + (isCorrect ? 'fb-correct' : 'fb-incorrect');
  fb.style.display = 'block';
  fb.innerHTML = `<strong>${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</strong>${q.explanation}`;

  document.getElementById('btn-submit').disabled = true;
  const isLast = current === questions.length - 1;
  document.getElementById('btn-next').style.display   = isLast ? 'none'  : 'inline-block';
  document.getElementById('btn-finish').style.display = isLast ? 'inline-block' : 'none';

  updateProgress();
}

function restoreState() {
  const q      = questions[current];
  const uAns   = userAnswers[current];
  const isCorr = uAns === q.correct;
  const btns   = document.querySelectorAll('.choice-btn');

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.correct) b.classList.add('correct');
    if (i === uAns && !isCorr) b.classList.add('incorrect');
  });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box show ' + (isCorr ? 'fb-correct' : 'fb-incorrect');
  fb.style.display = 'block';
  fb.innerHTML = `<strong>${isCorr ? '✅ Correct!' : '❌ Incorrect'}</strong>${q.explanation}`;

  document.getElementById('btn-submit').disabled = true;
  const isLast = current === questions.length - 1;
  document.getElementById('btn-next').style.display   = isLast ? 'none'  : 'inline-block';
  document.getElementById('btn-finish').style.display = isLast ? 'inline-block' : 'none';
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function updateProgress() {
  const pct = Math.round(((current + (submitted ? 1 : 0)) / questions.length) * 100);
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('score-badge').textContent = `Score: ${score} / ${answered}`;
}

// ─────────────────────────────────────────────
//  RESULTS
// ─────────────────────────────────────────────
function showResults() {
  document.getElementById('quiz-container').style.display  = 'none';
  document.getElementById('results-container').style.display = 'block';
  document.getElementById('progress-section').style.display  = 'none';

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('res-pct').textContent   = pct + '%';
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent   = questions.length - score;

  let headline, subtext;
  if (pct >= 80) { headline = '🎉 Excellent Work!';  subtext = 'You are well-prepared for the AZ-500 exam. Keep reviewing weak areas.'; }
  else if (pct >= 70) { headline = '👍 Good Progress!'; subtext = 'You are close to the passing threshold. Focus on the domains where you missed questions.'; }
  else { headline = '📚 Keep Studying!'; subtext = 'Review the domains where you lost points and revisit the study materials.'; }

  document.getElementById('res-headline').textContent = headline;
  document.getElementById('res-subtext').textContent  = subtext;

  buildReview();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildReview() {
  const container = document.getElementById('review-items');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  questions.forEach((q, i) => {
    const ua      = userAnswers[i];
    const isCorr  = ua === q.correct;
    const div     = document.createElement('div');
    div.className = 'review-item ' + (isCorr ? 'ri-correct' : 'ri-incorrect');

    const userAnsText    = ua !== null ? `${letters[ua]}. ${q.choices[ua].replace(/^[A-D]\.\s*/,'')}` : 'Not answered';
    const correctAnsText = `${letters[q.correct]}. ${q.choices[q.correct].replace(/^[A-D]\.\s*/,'')}`;

    div.innerHTML = `
      <div class="q-domain-badge ${{'D1':'badge-d1','D2':'badge-d2','D3':'badge-d3','D4':'badge-d4'}[q.domain]}" style="font-size:.68rem;padding:2px 8px;margin-bottom:8px;">${q.domainLabel}</div>
      <div class="review-q">${i + 1}. ${q.text}</div>
      <div class="review-meta">Your answer: <span class="ans-user">${userAnsText}</span></div>
      <div class="review-meta">Correct answer: <span class="ans-correct">${correctAnsText}</span></div>
      <div class="review-exp">💡 ${q.explanation}</div>
    `;
    container.appendChild(div);
  });
}

function restartQuiz() {
  current = 0;
  selected = null;
  submitted = false;
  score = 0;
  answered = 0;
  userAnswers.fill(null);

  document.getElementById('quiz-container').style.display    = 'block';
  document.getElementById('results-container').style.display = 'none';
  document.getElementById('progress-section').style.display  = 'flex';

  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
render();
</script>
</body>
</html>
