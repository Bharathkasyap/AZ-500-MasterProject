  },
  {
    q: "Azure Defender for DNS (now part of Microsoft Defender for Cloud) detects which type of attack where DNS queries are used as a covert data channel?",
    options: ["DNS amplification DDoS attack", "DNS cache poisoning", "DNS tunneling", "BGP hijacking via DNS"],
    answer: 2,
    explanation: "DNS tunneling encodes data in DNS queries and responses to create a covert communication channel, often used by malware for C2 communication. Microsoft Defender for DNS detects this anomalous DNS behavior."
  },
  {
    q: "An organization wants to enforce that no Azure subscription can be created without going through an approval process. Which Azure governance feature enables this?",
    options: ["Azure Policy 'Deny' effect on Microsoft.Subscription resource type", "Azure Subscription vending process using Management Group subscription placement policy and Azure Blueprints", "Azure Lighthouse cross-tenant management restriction", "Azure Cost Management subscription budget"],
    answer: 1,
    explanation: "Azure landing zone and subscription vending processes use Management Group policies and Azure Blueprints (or Bicep/Terraform pipelines) to enforce that new subscriptions are provisioned through an approved, governed process and placed in the correct management group hierarchy."
  }
];

function buildExam() {
  const exam = document.getElementById('exam');
  exam.innerHTML = '';
  questions.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.dataset.index = idx;
    card.dataset.answer = item.answer;

    const label = document.createElement('h3');
    label.textContent = `Question ${idx + 1} of ${questions.length} · Series Q${idx + 1}`;
    card.appendChild(label);

    const qText = document.createElement('p');
    qText.className = 'question-text';
    qText.textContent = item.q;
    card.appendChild(qText);

    const optDiv = document.createElement('div');
    optDiv.className = 'options';
    item.options.forEach((opt, oi) => {
      const lbl = document.createElement('label');
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = `q${idx}`;
      radio.value = oi;
      lbl.appendChild(radio);
      lbl.appendChild(document.createTextNode(String.fromCharCode(65 + oi) + '. ' + opt));
      optDiv.appendChild(lbl);
    });
    card.appendChild(optDiv);

    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.textContent = '💡 ' + item.explanation;
    card.appendChild(exp);

    exam.appendChild(card);
  });
}

document.getElementById('btn-submit').addEventListener('click', () => {
  let score = 0;
  document.querySelectorAll('.question-card').forEach(card => {
    const idx = parseInt(card.dataset.index);
    const correct = parseInt(card.dataset.answer);
    const selected = card.querySelector(`input[name="q${idx}"]:checked`);
    const labels = card.querySelectorAll('.options label');
    labels.forEach(l => { l.style.pointerEvents = 'none'; });
    labels[correct].classList.add('reveal');
    if (selected) {
      const val = parseInt(selected.value);
      if (val === correct) {
        score++;
        labels[val].classList.add('correct');
      } else {
        labels[val].classList.add('incorrect');
      }
    }
    card.querySelector('.explanation').classList.add('visible');
  });
  const pct = Math.round(score / questions.length * 100);
  const sd = document.getElementById('score-display');
  sd.style.display = 'block';
  sd.textContent = `Score: ${score} / ${questions.length} (${pct}%) — ${pct >= 70 ? '✅ Pass' : '❌ Keep studying!'}`;
  sd.scrollIntoView({ behavior: 'smooth' });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('score-display').style.display = 'none';
  buildExam();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

buildExam();
</script>
</body>
</html>
