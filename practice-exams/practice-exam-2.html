  {
    q: "A company needs to encrypt all secrets and keys in an HSM that they control. Which Azure Key Vault tier provides dedicated, single-tenant HSM capacity?",
    options: ["Azure Key Vault Standard tier", "Azure Key Vault Premium tier (software-protected keys)", "Azure Managed HSM (Hardware Security Module)", "Azure Key Vault Premium with HSM-protected keys"],
    answer: 2,
    explanation: "Azure Managed HSM provides a fully managed, single-tenant, FIPS 140-2 Level 3 validated HSM service. The customer retains full administrative control, and Microsoft cannot access the keys — unlike Key Vault Premium HSM-backed keys."
  },
  {
    q: "Which Azure feature provides continuous export of Microsoft Defender for Cloud alerts and recommendations to a Log Analytics workspace or Event Hub for integration with SIEM tools?",
    options: ["Azure Monitor Diagnostic Settings", "Defender for Cloud Continuous Export", "Azure Policy export function", "Azure Activity Log export"],
    answer: 1,
    explanation: "Defender for Cloud's Continuous Export feature streams security alerts, recommendations, and secure score data to Log Analytics workspaces or Event Hubs in near-real-time for downstream SIEM integration."
  },
];

function buildExam() {
  const exam = document.getElementById('exam');
  exam.innerHTML = '';
  questions.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.dataset.index = idx;
    card.dataset.answer = item.answer;

    const label = document.createElement('h3');
    label.textContent = `Question ${idx + 1} of ${questions.length} · Series Q${idx + 51}`;
    card.appendChild(label);

    const qText = document.createElement('p');
    qText.className = 'question-text';
    qText.textContent = item.q;
    card.appendChild(qText);

    const optDiv = document.createElement('div');
    optDiv.className = 'options';
    item.options.forEach((opt, oi) => {
      const lbl = document.createElement('label');
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = `q${idx}`;
      radio.value = oi;
      lbl.appendChild(radio);
      lbl.appendChild(document.createTextNode(String.fromCharCode(65 + oi) + '. ' + opt));
      optDiv.appendChild(lbl);
    });
    card.appendChild(optDiv);

    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.textContent = '💡 ' + item.explanation;
    card.appendChild(exp);

    exam.appendChild(card);
  });
}

document.getElementById('btn-submit').addEventListener('click', () => {
  let score = 0;
  document.querySelectorAll('.question-card').forEach(card => {
    const idx = parseInt(card.dataset.index);
    const correct = parseInt(card.dataset.answer);
    const selected = card.querySelector(`input[name="q${idx}"]:checked`);
    const labels = card.querySelectorAll('.options label');
    labels.forEach(l => { l.style.pointerEvents = 'none'; });
    labels[correct].classList.add('reveal');
    if (selected) {
      const val = parseInt(selected.value);
      if (val === correct) {
        score++;
        labels[val].classList.add('correct');
      } else {
        labels[val].classList.add('incorrect');
      }
    }
    card.querySelector('.explanation').classList.add('visible');
  });
  const pct = Math.round(score / questions.length * 100);
  const sd = document.getElementById('score-display');
  sd.style.display = 'block';
  sd.textContent = `Score: ${score} / ${questions.length} (${pct}%) — ${pct >= 70 ? '✅ Pass' : '❌ Keep studying!'}`;
  sd.scrollIntoView({ behavior: 'smooth' });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('score-display').style.display = 'none';
  buildExam();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

buildExam();
</script>
</body>
</html>
