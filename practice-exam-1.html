const letters = ['A', 'B', 'C', 'D'];
let answered = new Array(questions.length).fill(null); // null = unanswered, true = correct, false = wrong
let score = 0;

function buildExam() {
  const container = document.getElementById('examContainer');
  container.innerHTML = '';
  answered = new Array(questions.length).fill(null);
  score = 0;
  updateScoreBar();

  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + qi;

    const badge = document.createElement('div');
    badge.className = 'domain-badge';
    badge.textContent = q.domain;

    const num = document.createElement('div');
    num.className = 'question-number';
    num.textContent = 'Question ' + (qi + 1) + ' of 50';

    const qtext = document.createElement('div');
    qtext.className = 'question-text';
    qtext.textContent = q.q;

    const ol = document.createElement('ul');
    ol.className = 'options-list';
    ol.id = 'options-' + qi;

    q.options.forEach((opt, oi) => {
      const li = document.createElement('li');
      li.className = 'option';
      li.id = 'opt-' + qi + '-' + oi;
      li.setAttribute('data-q', qi);
      li.setAttribute('data-o', oi);
      li.addEventListener('click', handleOptionClick);

      const letter = document.createElement('span');
      letter.className = 'option-letter';
      letter.textContent = letters[oi];

      const text = document.createElement('span');
      text.className = 'option-text';
      text.textContent = opt;

      li.appendChild(letter);
      li.appendChild(text);
      ol.appendChild(li);
    });

    const expl = document.createElement('div');
    expl.className = 'explanation';
    expl.id = 'expl-' + qi;
    expl.innerHTML = '<p><strong>Explanation:</strong> ' + escapeHtml(q.explanation) + '</p>';

    card.appendChild(badge);
    card.appendChild(num);
    card.appendChild(qtext);
    card.appendChild(ol);
    card.appendChild(expl);
    container.appendChild(card);
  });
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function handleOptionClick(e) {
  const li = e.currentTarget;
  const qi = parseInt(li.getAttribute('data-q'));
  const oi = parseInt(li.getAttribute('data-o'));

  if (answered[qi] !== null) return;

  const correct = questions[qi].correct;
  const isCorrect = oi === correct;

  answered[qi] = isCorrect;
  if (isCorrect) score++;

  // Disable all options for this question
  const allOpts = document.querySelectorAll('[data-q="' + qi + '"]');
  allOpts.forEach(opt => opt.classList.add('disabled'));

  // Style chosen option
  li.classList.add(isCorrect ? 'correct' : 'wrong');

  // Always reveal correct answer if wrong
  if (!isCorrect) {
    document.getElementById('opt-' + qi + '-' + correct).classList.add('show-correct');
  }

  // Show explanation
  document.getElementById('expl-' + qi).classList.add('visible');

  updateScoreBar();
}

function updateScoreBar() {
  const answeredCount = answered.filter(a => a !== null).length;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('answeredDisplay').textContent = answeredCount;
  document.getElementById('progressDisplay').textContent = answeredCount;
}

function submitExam() {
  const answeredCount = answered.filter(a => a !== null).length;
  const pct = Math.round((score / 50) * 100);

  document.getElementById('finalScore').textContent = pct;
  document.getElementById('finalCorrect').textContent = score;

  let grade, detail, gradeClass;
  if (pct >= 70) {
    grade = '✅ PASS';
    gradeClass = 'pass';
    if (pct >= 90) detail = 'Outstanding! Excellent command of Azure security concepts.';
    else if (pct >= 80) detail = 'Great work! Strong grasp of identity and networking security.';
    else detail = 'Good job! You\'ve met the passing threshold. Review missed questions for exam readiness.';
  } else {
    grade = '❌ FAIL';
    gradeClass = 'fail';
    detail = 'Keep studying! Focus on the areas where you missed questions. The passing score for AZ-500 is approximately 700/1000 (~70%).';
  }

  if (answeredCount < 50) {
    detail = '(' + (50 - answeredCount) + ' question(s) unanswered — counted as incorrect) ' + detail;
  }

  const gradeEl = document.getElementById('gradeText');
  gradeEl.textContent = grade;
  gradeEl.className = 'result-grade ' + gradeClass;
  document.getElementById('gradeDetail').textContent = detail;

  document.getElementById('resultModal').classList.add('show');
}

function resetExam() {
  document.getElementById('resultModal').classList.remove('show');
  buildExam();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Close modal when clicking backdrop
document.getElementById('resultModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('show');
});

buildExam();
</script>
