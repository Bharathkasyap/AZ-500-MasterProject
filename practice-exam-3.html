<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZ-500 Practice Exam 3 &mdash; Advanced Mixed Domains</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── Sticky score bar ── */
    #score-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    #score-bar .label { font-size: 13px; color: #8b949e; }
    #score-bar .value { font-size: 15px; font-weight: 700; color: #58a6ff; }
    #score-bar .correct-val { color: #3fb950; }
    #score-bar .wrong-val  { color: #f85149; }
    #score-bar .spacer { flex: 1; }
    #score-bar button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    #score-bar button:hover { background: #30363d; }
    #submit-btn {
      background: #1f6feb !important;
      border-color: #388bfd !important;
      color: #fff !important;
      font-weight: 600;
    }
    #submit-btn:hover { background: #388bfd !important; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a237e, #0288d1);
      padding: 40px 24px 32px;
      text-align: center;
    }
    header h1 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    header p  { font-size: 14px; color: rgba(255,255,255,0.82); }
    .header-meta {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .header-meta span {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      color: #e3f2fd;
    }

    /* ── Main layout ── */
    main { max-width: 860px; margin: 32px auto; padding: 0 16px 80px; }

    /* ── Question card ── */
    .question-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }
    .question-card.answered-correct { border-color: #3fb950; }
    .question-card.answered-wrong   { border-color: #f85149; }

    .question-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .q-number {
      background: #1f6feb;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 5px;
      padding: 2px 8px;
      white-space: nowrap;
      margin-top: 2px;
    }
    .domain-badge {
      font-size: 11px;
      font-weight: 600;
      border-radius: 20px;
      padding: 2px 10px;
      white-space: nowrap;
      margin-top: 2px;
    }
    .d1 { background: #0d2f6e; color: #79c0ff; }
    .d2 { background: #0d3b2e; color: #56d364; }
    .d3 { background: #2d1f07; color: #e3b341; }
    .d4 { background: #2d0f1a; color: #ff7b72; }
    .da { background: #1d1d40; color: #d2a8ff; }

    .question-text {
      font-size: 15px;
      line-height: 1.6;
      color: #e6edf3;
    }

    /* ── Options ── */
    .options { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-size: 14px;
      line-height: 1.5;
    }
    .option:hover:not(.disabled) { background: #21262d; border-color: #58a6ff; }
    .option.disabled { cursor: default; }
    .option.correct  { background: #0d2b1c; border-color: #3fb950; }
    .option.wrong    { background: #2b0d0d; border-color: #f85149; }
    .option.reveal   { background: #0d2b1c; border-color: #3fb950; }

    .option-letter {
      font-weight: 700;
      font-size: 13px;
      color: #8b949e;
      min-width: 20px;
    }
    .option.correct .option-letter { color: #3fb950; }
    .option.wrong   .option-letter { color: #f85149; }
    .option.reveal  .option-letter { color: #3fb950; }

    /* ── Explanation ── */
    .explanation {
      display: none;
      margin-top: 14px;
      background: #0d1117;
      border-left: 3px solid #58a6ff;
      border-radius: 0 6px 6px 0;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: #8b949e;
    }
    .explanation.show { display: block; }
    .explanation strong { color: #58a6ff; }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    #modal-overlay.show { display: flex; }
    #modal-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 36px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    #modal-box h2 { font-size: 28px; margin-bottom: 10px; }
    #modal-box .pass  { color: #3fb950; }
    #modal-box .fail  { color: #f85149; }
    #modal-box p  { color: #8b949e; font-size: 14px; margin-bottom: 8px; }
    #modal-box .score-big {
      font-size: 52px;
      font-weight: 700;
      margin: 16px 0;
    }
    #modal-box .details { margin: 16px 0; }
    #modal-close {
      margin-top: 20px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 10px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    #modal-close:hover { background: #30363d; }

    /* ── Progress bar ── */
    #progress-wrap { background: #21262d; border-radius: 4px; height: 6px; margin-top: 4px; width: 180px; }
    #progress-fill { height: 6px; border-radius: 4px; background: #58a6ff; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>

<!-- Sticky score bar -->
<div id="score-bar">
  <span class="label">Score:</span>

  <div>
    <div id="progress-wrap"><div id="progress-fill"></div></div>
  </div>
  <div class="spacer"></div>
  <button id="submit-btn" onclick="submitExam()">Submit Exam</button>
  <button onclick="resetExam()">Reset</button>
</div>

<!-- Header -->
<header>
  <h1>AZ-500 Practice Exam 3 &mdash; Advanced Mixed Domains</h1>
  <p>Microsoft Azure Security Technologies &nbsp;|&nbsp; Exam 3 of 4</p>
  <div class="header-meta">
    <span>&#128203; 50 Questions</span>
    <span>&#9201; No Time Limit</span>
    <span>&#127919; Pass: 70% (35/50)</span>
    <span>&#127381; Advanced &amp; Mixed Difficulty</span>
  </div>
</header>

<!-- Questions -->
<main id="quiz-container"></main>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title"></h2>
    <div class="score-big" id="modal-pct"></div>
    <p id="modal-msg"></p>
    <div class="details">
      <p>&#9989; Correct: <strong id="modal-correct"></strong></p>
      <p>&#10060; Wrong: <strong id="modal-wrong"></strong></p>
      <p>&#11093; Unanswered: <strong id="modal-unanswered"></strong></p>
    </div>
    <button id="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

// ── State ──
let answered  = new Array(QUESTIONS.length).fill(false);
let results   = new Array(QUESTIONS.length).fill(null); // true/false/null

// ── Render ──
function render() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  QUESTIONS.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + idx;

    const letters = ['A', 'B', 'C', 'D'];

    let optionsHTML = q.options.map((opt, oi) => {
      return `<div class="option" id="opt-${idx}-${oi}" onclick="selectOption(${idx},${oi})">
        <span class="option-letter">${letters[oi]}</span>
        <span>${opt}</span>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="question-header">
        <span class="q-number">Q${q.id}</span>
        <span class="domain-badge ${q.domain}">${q.domainLabel}</span>
      </div>
      <div class="question-text">${q.text}</div>
      <div class="options">${optionsHTML}</div>
      <div class="explanation" id="exp-${idx}">
        <strong>&#128161; Explanation:</strong> ${q.explanation}
      </div>
    `;

    container.appendChild(card);
  });

  updateScoreBar();
}

// ── Select option ──
function selectOption(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;

  const q = QUESTIONS[qIdx];
  const isCorrect = (optIdx === q.correct);
  results[qIdx] = isCorrect;

  const letters = ['A', 'B', 'C', 'D'];

  // Style all options
  q.options.forEach((_, oi) => {
    const el = document.getElementById('opt-' + qIdx + '-' + oi);
    el.classList.add('disabled');
    if (oi === q.correct) {
      el.classList.add(oi === optIdx ? 'correct' : 'reveal');
    } else if (oi === optIdx) {
      el.classList.add('wrong');
    }
  });

  // Card border
  const card = document.getElementById('card-' + qIdx);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  // Show explanation
  document.getElementById('exp-' + qIdx).classList.add('show');

  updateScoreBar();
}

// ── Score bar ──
function updateScoreBar() {
  const total     = QUESTIONS.length;
  const correct   = results.filter(r => r === true).length;
  const wrong     = results.filter(r => r === false).length;
  const answeredN = answered.filter(Boolean).length;

  document.getElementById('sb-score').textContent    = correct + ' / ' + total;
  document.getElementById('sb-correct').textContent  = correct;
  document.getElementById('sb-wrong').textContent    = wrong;
  document.getElementById('sb-answered').textContent = answeredN;

  const pct = (answeredN / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Submit ──
function submitExam() {
  const total      = QUESTIONS.length;
  const correct    = results.filter(r => r === true).length;
  const wrong      = results.filter(r => r === false).length;
  const unanswered = answered.filter(v => !v).length;
  const pct        = Math.round((correct / total) * 100);
  const pass       = pct >= 70;

  document.getElementById('modal-title').textContent  = pass ? '🎉 PASSED!' : '❌ NOT PASSED';
  document.getElementById('modal-title').className    = pass ? 'pass' : 'fail';
  document.getElementById('modal-pct').textContent    = pct + '%';
  document.getElementById('modal-pct').style.color    = pass ? '#3fb950' : '#f85149';
  document.getElementById('modal-msg').textContent    = pass
    ? 'Congratulations! You passed the exam. Keep up the excellent work!'
    : 'You need 70% (35/50) to pass. Review the explanations and try again.';
  document.getElementById('modal-correct').textContent   = correct;
  document.getElementById('modal-wrong').textContent     = wrong;
  document.getElementById('modal-unanswered').textContent = unanswered;

  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// ── Reset ──
function resetExam() {
  answered = new Array(QUESTIONS.length).fill(false);
  results  = new Array(QUESTIONS.length).fill(null);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──
render();
</script>
